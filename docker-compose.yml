version: '3.8'

services:
  # The Vector Engine
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333" # REST API (for debugging)
      - "6334:6334" # gRPC (for high-speed Python client)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # The Relational Metadata Engine
  postgres:
    image: postgres:15-alpine
    container_name: land_records_pg
    environment:
      POSTGRES_USER: ai_architect
      POSTGRES_PASSWORD: rootpassword123
      POSTGRES_DB: compliance_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  pg_data: